version: '3.8'

services:
  # ========== SERVIDOR DNS ==========
  dns-server:
    build: ./dns
    container_name: zenfocus-dns
    hostname: dns.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.91
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nslookup", "www.zenfocus.com.br", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== AUTORIDADE CERTIFICADORA ==========
  ca-server:
    build: ./ca
    container_name: zenfocus-ca
    hostname: ca.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.96
    volumes:
      - ca-certs:/opt/easy-rsa/pki
    restart: unless-stopped

  # ========== BANCO DE DADOS MYSQL ==========
  mysql:
    image: mysql:8.0
    container_name: zenfocus-db
    hostname: db.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.95
    environment:
      MYSQL_ROOT_PASSWORD: zenfocus123
      MYSQL_DATABASE: zenfocus_db
      MYSQL_USER: zenfocus
      MYSQL_PASSWORD: zenfocus123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./web-app/src/database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uzenfocus", "-pzenfocus123"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== APLICAÇÃO WEB ==========
  web-app:
    build: ./web-app
    container_name: zenfocus-web
    hostname: www.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.94
    ports:
      - "80:80"
      - "443:443"
    environment:
      DB_HOST: zenfocus-db
      DB_NAME: zenfocus_db
      DB_USER: zenfocus
      DB_PASS: zenfocus123
    volumes:
      - ./web-app/src:/var/www/html
      - ca-certs:/etc/ssl/zenfocus:ro
    depends_on:
      mysql:
        condition: service_healthy
      dns-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api.php?action=health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== GITLAB ==========
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: zenfocus-gitlab
    hostname: gitlab.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.92
    ports:
      - "8080:80"
      - "8443:443"
      - "2222:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.zenfocus.com.br'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        
        # Configurações de performance
        postgresql['shared_buffers'] = "256MB"
        postgresql['max_connections'] = 200
        
        # Configurações de email (opcional)
        gitlab_rails['smtp_enable'] = false
        
        # Configurações de backup
        gitlab_rails['backup_keep_time'] = 604800
        
        # Registry desabilitado para economizar recursos
        registry['enable'] = false
        
        # Monitoring
        prometheus_monitoring['enable'] = false
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    depends_on:
      - dns-server
    restart: unless-stopped
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "gitlab-healthcheck", "--fail"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

  # ========== GITLAB RUNNER ==========
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: zenfocus-runner
    hostname: runner.zenfocus.com.br
    networks:
      zenfocus-net:
        ipv4_address: 10.164.59.93
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner/config.toml:/etc/gitlab-runner/config.toml
      - runner-config:/etc/gitlab-runner
    depends_on:
      gitlab:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

# ========== REDES ==========
networks:
  zenfocus-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.164.59.0/24
          gateway: 10.164.59.1

# ========== VOLUMES ==========
volumes:
  mysql-data:
    driver: local
  gitlab-config:
    driver: local
  gitlab-logs:
    driver: local
  gitlab-data:
    driver: local
  runner-config:
    driver: local
  ca-certs:
    driver: local
