server {
    listen 80;
    server_name gitlab.zenfocus.local;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gitlab.zenfocus.local;

    ssl_certificate /etc/nginx/ssl/gitlab.zenfocus.local.crt;
    ssl_certificate_key /etc/nginx/ssl/gitlab.zenfocus.local.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/gitlab_access.log;
    error_log /var/log/nginx/gitlab_error.log;

    location / {
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Upstream GitLab listens on HTTPS (443) inside the container
        proxy_pass         https://10.10.10.20:443;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        # Se estiver usando CA interna gerada, você pode configurar o arquivo
        # proxy_ssl_trusted_certificate /etc/nginx/ssl/zenfocus-ca.crt.pem;
        # Para evitar falhas com certificado auto-assinado, desabilitar verificação
        proxy_ssl_verify off;
        proxy_read_timeout 90;
    }
}
