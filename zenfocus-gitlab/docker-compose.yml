services:
  # Servidor DNS
  dns:
    image: sameersbn/bind:latest
    container_name: zenfocus-dns
    # Mapeamento alterado para evitar conflito com serviços do host (ex: systemd-resolved)
    # Use porta 1053 no host para encaminhar ao 53 do container
    ports:
      - "${DNS_PORT}:53/udp"
      - "${DNS_PORT}:53/tcp"
    environment:
      - WEBMIN_ENABLED=${WEBMIN_ENABLED}
    volumes:
      - ./dns/data:/data
    networks:
      zenfocus-net:
        ipv4_address: 10.10.10.10

  # Servidor de CA (gera CA e certificados para GitLab)
  ca:
    build:
      context: ./ca
    container_name: zenfocus-ca
    volumes:
      - ./gitlab/ssl:/certs
    networks:
      zenfocus-net:
        ipv4_address: 10.10.10.30
    restart: "no"

  # Servidor GitLab
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: zenfocus-gitlab
    hostname: ${GITLAB_DOMAIN}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://${GITLAB_DOMAIN}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
        # Habilitar SSL se os arquivos existirem em /etc/gitlab/ssl
        nginx['redirect_http_to_https'] = false
        nginx['ssl_certificate'] = "/etc/gitlab/ssl/${GITLAB_DOMAIN}.crt"
        nginx['ssl_certificate_key'] = "/etc/gitlab/ssl/${GITLAB_DOMAIN}.key"
    ports:
      - "${GITLAB_SSH_PORT}:22"
    volumes:
      - ./gitlab/config:/etc/gitlab
      - ./gitlab/logs:/var/log/gitlab
      - ./gitlab/data:/var/opt/gitlab
      - ./gitlab/ssl:/etc/gitlab/ssl
    networks:
      zenfocus-net:
        ipv4_address: 10.10.10.20
    depends_on:
      - dns
    restart: unless-stopped

  # Proxy web (nginx) expõe HTTP/HTTPS no host e faz reverse-proxy para o GitLab
  proxy:
    image: nginx:stable-alpine
    container_name: zenfocus-proxy
    ports:
      - "${PROXY_HTTP_PORT}:80"
      - "${PROXY_HTTPS_PORT}:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gitlab/ssl:/etc/nginx/ssl:ro
    networks:
      - zenfocus-net
    depends_on:
      - gitlab
    restart: unless-stopped

  # Aplicação Pomodoro (PHP + Apache)
  db:
    image: mariadb:11
    container_name: zenfocus-db
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./app/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      zenfocus-net:
        ipv4_address: 10.10.10.22
    restart: unless-stopped

  # Aplicacao CRUD (PHP + Apache)
  app:
    build:
      context: ./app
    container_name: zenfocus-app
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${MARIADB_DATABASE}
      - DB_USER=${MARIADB_USER}
      - DB_PASSWORD=${MARIADB_PASSWORD}
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./app:/var/www/html:rw
    ports:
      - "${APP_PORT}:80"
    networks:
      zenfocus-net:
        ipv4_address: 10.10.10.21
    depends_on:
      - db
    restart: unless-stopped

networks:
  zenfocus-net:
    external: true
    name: zenfocus-net

volumes:
  db_data:
