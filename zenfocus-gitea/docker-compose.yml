services:
  # Servidor DNS
  dns:
    image: sameersbn/bind:latest
    container_name: zenfocus-gitea-dns
    ports:
      - '${DNS_PORT}:53/udp'
      - '${DNS_PORT}:53/tcp'
    environment:
      - WEBMIN_ENABLED=${WEBMIN_ENABLED}
    volumes:
      - ./dns/data:/data
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.10

  # Servidor de CA (gera CA e certificados para Gitea)
  ca:
    build:
      context: ./ca
    container_name: zenfocus-gitea-ca
    volumes:
      - ./gitea/ssl:/certs
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.30
    restart: 'no'

  # Servidor Gitea
  gitea:
    image: gitea/gitea:latest
    container_name: zenfocus-gitea
    hostname: ${GITEA_DOMAIN}
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - GITEA__SERVER__DOMAIN=${GITEA_DOMAIN}
      - GITEA__SERVER__ROOT_URL=https://${GITEA_DOMAIN}
      - GITEA__SERVER__SSH_DOMAIN=${GITEA_DOMAIN}
      - GITEA__SERVER__SSH_PORT=${GITEA_SSH_PORT}
      - GITEA__SERVER__SSH_LISTEN_PORT=22
      - GITEA__SERVER__HTTP_PORT=3000
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=db:3306
      - GITEA__database__NAME=${MYSQL_DATABASE}
      - GITEA__database__USER=${MYSQL_USER}
      - GITEA__database__PASSWD=${MYSQL_PASSWORD}
    ports:
      - '${GITEA_SSH_PORT}:22'
    volumes:
      # A imagem oficial persiste repositórios/config em /data
      - ./gitea/data:/data
      - ./gitea/config:/etc/gitea
      - ./gitea/logs:/var/log/gitea
      - ./gitea/ssl:/etc/gitea/ssl
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.20
    depends_on:
      - dns
      - db
    restart: unless-stopped

  # Banco de dados para Gitea e Aplicacao
  db:
    image: mysql:8.0
    container_name: zenfocus-gitea-db
    ports:
      - '${MYSQL_BIND_HOST}:${MYSQL_PORT}:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.22
    restart: unless-stopped

  # Proxy web (nginx) expõe HTTP/HTTPS no host e faz reverse-proxy para o Gitea
  proxy:
    image: nginx:stable-alpine
    container_name: zenfocus-gitea-proxy
    ports:
      - '${PROXY_HTTP_PORT}:80'
      - '${PROXY_HTTPS_PORT}:443'
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gitea/ssl:/etc/nginx/ssl:ro
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.23
    depends_on:
      - gitea
    restart: unless-stopped

  # Act Runner do Gitea Actions (opcional via profile)
  act_runner:
    image: docker.io/gitea/act_runner:latest
    container_name: zenfocus-gitea-runner
    profiles:
      - actions
    environment:
      - CONFIG_FILE=/config.yaml
      - GITEA_INSTANCE_URL=${ACT_RUNNER_INSTANCE_URL:-https://${GITEA_DOMAIN}}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${ACT_RUNNER_REGISTRATION_TOKEN:-}
      - GITEA_RUNNER_NAME=${ACT_RUNNER_NAME:-zenfocus-runner}
      - GITEA_RUNNER_LABELS=${ACT_RUNNER_LABELS:-ubuntu-latest:docker://node:20-bookworm,ubuntu-22.04:docker://node:20-bookworm}
    volumes:
      - ./runner/config.yaml:/config.yaml:ro
      - ./runner/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      zenfocus-gitea-net:
        ipv4_address: 10.30.30.24
    depends_on:
      - gitea
    restart: unless-stopped

networks:
  zenfocus-gitea-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24

volumes:
  mysql_data:
